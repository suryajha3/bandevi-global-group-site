services:
  - type: web
    name: bandevi-global-group-site
    runtime: static
    buildCommand: echo "BANDEVI GLOBAL GROUP static site ready"
    staticPublishPath: .
    domains:
      - bandeviglobalgroup.com
    headers:
      - path: /*
        name: X-Frame-Options
        value: sameorigin
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
